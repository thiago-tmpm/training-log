<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Training">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <!-- Paint the canvas dark immediately, before the render-blocking external
       stylesheets load, so the cold-start frame between the iOS splash and the
       styled page is #0D0D0D instead of the WebView's default gray. Inline on
       purpose: a rule inside style.css can't do this — style.css is the very
       resource we're waiting on. -->
  <style>html, body { background-color: #0D0D0D; }</style>
  <link rel="stylesheet" href="./fonts/fonts.css">
  <link rel="stylesheet" href="./style.css">
  <title>Training Log</title>
</head>

<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <span class="home-date" id="home-date"></span>
      <div class="home-header-actions">
        <button class="icon-btn" id="btn-export" aria-label="Export data">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"/>
            <polyline points="7 10 12 15 17 10"/>
            <path d="M5 19h14"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-bodyweight" aria-label="Log bodyweight">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7h16a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a1 1 0 0 1 1-1z"/>
            <path d="M8 7V5a4 4 0 0 1 8 0v2"/>
            <line x1="12" y1="12" x2="12" y2="15"/>
            <line x1="10" y1="13.5" x2="14" y2="13.5"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-builder" aria-label="Edit workout">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="7" x2="14" y2="7"/>
            <line x1="18" y1="7" x2="20" y2="7"/>
            <circle cx="16" cy="7" r="2"/>
            <line x1="4" y1="12" x2="8" y2="12"/>
            <line x1="12" y1="12" x2="20" y2="12"/>
            <circle cx="10" cy="12" r="2"/>
            <line x1="4" y1="17" x2="16" y2="17"/>
            <circle cx="18" cy="17" r="2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="home-hero">
      <p class="home-label">TODAY</p>
      <button class="workout-name-btn" id="btn-select-day" aria-label="Change workout day">
        <h1 class="home-workout-name" id="home-workout-name">—</h1>
        <svg class="chevron-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>
    <div class="home-actions">
      <button class="btn-primary" id="btn-start-workout">Start Workout</button>
      <button class="btn-secondary" id="btn-log-cardio">Log Cardio</button>
      <button class="btn-water-home" id="btn-water-home">
        💧 Water — <span id="home-water-count">0</span>
      </button>
    </div>
  </div>


  <!-- EXERCISE SCREEN -->
  <div id="screen-exercise" class="screen">
    <div class="ex-header">
      <button class="back-btn hidden" id="btn-prev-exercise" aria-label="Previous exercise">← Back</button>
      <span class="ex-progress" id="ex-progress">1 / 1</span>
      <button class="skip-btn" id="btn-skip-exercise">Skip</button>
    </div>
    <div class="ex-body">
      <div class="ex-info">
        <h2 class="ex-name" id="ex-name"></h2>
        <span class="ex-rep-range" id="ex-rep-range"></span>
      </div>
      <div class="sets-container" id="sets-container"></div>
      <div class="ex-extras">
        <button class="extras-toggle" id="btn-machine-adj"
          onclick="toggleExtras('machine-adj-content', 'btn-machine-adj', 'Machine Adjustment')">
          + Machine Adjustment
        </button>
        <div class="extras-content hidden" id="machine-adj-content">
          <textarea id="input-machine-adj" class="extras-textarea"
            placeholder="Seat position, pin, angle..."></textarea>
        </div>
        <button class="extras-toggle" id="btn-observations"
          onclick="toggleExtras('observations-content', 'btn-observations', 'Observations')">
          + Observations
        </button>
        <div class="extras-content hidden" id="observations-content">
          <textarea id="input-observations" class="extras-textarea"
            placeholder="Notes about this exercise..."></textarea>
        </div>
      </div>
    </div>
    <div class="ex-footer">
      <button class="btn-primary" id="btn-next-exercise">Next Exercise</button>
    </div>
  </div>


  <!-- SESSION END SCREEN -->
  <div id="screen-session-end" class="screen">
    <div class="end-header">
      <h1 class="end-title">Done.</h1>
    </div>
    <div class="end-stats">
      <div class="end-stat">
        <span class="end-stat-label">Duration</span>
        <span class="end-stat-value" id="end-duration">—</span>
      </div>
      <div class="end-stat">
        <span class="end-stat-label">Exercises</span>
        <span class="end-stat-value" id="end-exercises">—</span>
      </div>
    </div>
    <div class="end-bodyweight">
      <label class="end-label" for="input-bodyweight">Bodyweight</label>
      <div class="end-weight-row">
        <input type="text" inputmode="decimal" id="input-bodyweight" placeholder="0.0" autocomplete="off">
        <span class="unit">kg</span>
      </div>
    </div>
    <div class="end-footer">
      <button class="btn-primary" id="btn-finish-session">Finish</button>
    </div>
  </div>


<!-- CARDIO TYPE SELECTION -->
  <div id="screen-cardio-type" class="screen">
    <div class="cardio-type-header">
      <button class="back-btn" onclick="showScreen('screen-home')">← Back</button>
      <span class="cardio-screen-title">LOG CARDIO</span>
      <span></span>
    </div>
    <div class="cardio-type-list">
      <button class="cardio-type-card" onclick="selectCardioType('run')">
        <span class="cardio-type-icon">🏃</span>
        <span class="cardio-type-label">RUN</span>
      </button>
      <button class="cardio-type-card" onclick="selectCardioType('bike')">
        <span class="cardio-type-icon">🚴</span>
        <span class="cardio-type-label">BIKE</span>
      </button>
      <button class="cardio-type-card" onclick="selectCardioType('other')">
        <span class="cardio-type-icon">⚡</span>
        <span class="cardio-type-label">OTHER</span>
      </button>
    </div>
  </div>

  <!-- CARDIO LOG -->
  <div id="screen-cardio-log" class="screen">
    <div class="cardio-type-header">
      <button class="back-btn" onclick="showScreen('screen-cardio-type')">← Back</button>
      <span class="cardio-screen-title" id="cardio-log-title"></span>
      <span></span>
    </div>
    <div class="cardio-log-body">

      <div class="cardio-field-group">
        <label class="cardio-label">DATE</label>
        <input type="date" id="cardio-date" class="cardio-date-input"
               onchange="onCardioDateChange(this.value)">
      </div>

      
      <div class="cardio-field-group">
        <label class="cardio-label">DURATION</label>
        <div class="cardio-input-wrap">
          <input type="number" id="cardio-duration" class="cardio-input"
                  placeholder="0" inputmode="numeric" min="0">
          <span class="cardio-unit">min</span>
        </div>
      </div>
      <div class="cardio-field-group">
        <label class="cardio-label">AVG HR</label>
        <div class="cardio-input-wrap">
          <input type="number" id="cardio-hr" class="cardio-input"
                  placeholder="0" inputmode="numeric" min="0">
          <span class="cardio-unit">bpm</span>
        </div>
      </div>

      <div class="cardio-field-group">
        <label class="cardio-label">ACTIVE KCAL</label>
        <div class="cardio-input-wrap">
          <input type="number" id="cardio-active-kcal" class="cardio-input"
                 placeholder="0" inputmode="numeric" min="0">
          <span class="cardio-unit">kcal</span>
        </div>
      </div>

      <div class="cardio-divider">OPTIONAL</div>

      <div class="cardio-field-group">
        <label class="cardio-label">TOTAL KCAL</label>
        <div class="cardio-input-wrap">
          <input type="number" id="cardio-total-kcal" class="cardio-input"
                 placeholder="0" inputmode="numeric" min="0">
          <span class="cardio-unit">kcal</span>
        </div>
      </div>

      <div class="cardio-field-group">
        <label class="cardio-label">EFFORT</label>
        <div class="effort-selector">
          <div class="effort-buttons">
            <button class="effort-btn" data-level="1" onclick="selectEffort(1)">1</button>
            <button class="effort-btn" data-level="2" onclick="selectEffort(2)">2</button>
            <button class="effort-btn" data-level="3" onclick="selectEffort(3)">3</button>
            <button class="effort-btn" data-level="4" onclick="selectEffort(4)">4</button>
            <button class="effort-btn" data-level="5" onclick="selectEffort(5)">5</button>
          </div>
          <div id="effort-label" class="effort-label-text"></div>
        </div>
      </div>

    </div><!-- end cardio-log-body -->
    <div class="cardio-log-footer">
      <button class="btn-primary" id="btn-save-cardio" onclick="saveCardioSession()">Save</button>
    </div>
  </div>

  <!-- CARDIO SUMMARY -->
  <div id="screen-cardio-summary" class="screen">
    <div class="end-header">
      <h1 class="end-title">Logged.</h1>
    </div>
    <div class="end-stats" id="cardio-summary-stats"></div>
    <div class="end-footer">
      <button class="btn-primary" onclick="finishCardioSession()">Done</button>
    </div>
  </div>

  <div id="screen-bodyweight" class="screen">
    <div class="placeholder-screen">
      <p>Bodyweight Log</p>
      <p class="muted">WBS 4.2 — coming later</p>
      <button class="btn-secondary" onclick="showScreen('screen-home')">← Back</button>
    </div>
  </div>

  <!-- WORKOUT BUILDER — day list (Phase 2.3, Slice A) -->
  <div id="screen-builder" class="screen">
    <div class="builder-header">
      <button class="back-btn" onclick="closeBuilder()">← Home</button>
      <span class="builder-title">WORKOUT BUILDER</span>
      <span></span>
    </div>
    <div class="builder-body" id="builder-day-list"></div>
  </div>

  <!-- WORKOUT BUILDER — single day's exercises (read-only in Slice A) -->
  <div id="screen-builder-day" class="screen">
    <div class="builder-header">
      <button class="back-btn" onclick="openBuilder()">← Back</button>
      <span class="builder-title" id="builder-day-title"></span>
      <span></span>
    </div>
    <div class="builder-body builder-body--list" id="builder-exercise-list"></div>
  </div>

  <!-- BOTTOM SHEETS -->
  <div class="sheet-overlay" id="sheet-day-select">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-title">Select Workout</p>
      <div class="sheet-options" id="sheet-day-options"></div>
    </div>
  </div>

  <div class="sheet-overlay" id="sheet-skip">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-title">Skip Exercise</p>
      <div class="sheet-options">
        <button class="sheet-option" onclick="skipExercise('not_today')">Not doing today</button>
        <button class="sheet-option" onclick="skipExercise('come_back_later')">Come back later</button>
      </div>
    </div>
  </div>

  <div class="sheet-overlay" id="sheet-resume">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-title">Unfinished Workout</p>
      <p class="sheet-text" id="resume-detail"></p>
      <div class="sheet-options">
        <button class="sheet-option" id="btn-resume-yes">Resume</button>
        <button class="sheet-option" id="btn-resume-no">Discard</button>
      </div>
    </div>
  </div>


  <!-- Load order: exercises → db → app → workout → cardio -->
  <script src="./exercises.js"></script>
  <script src="./db.js"></script>
  <script src="./app.js"></script>
  <script src="./workout.js"></script>
  <script src="./cardio.js"></script>
  <script src="./export.js"></script>
  <script src="./builder.js"></script>


  <!-- WATER FAB — persistent across all screens -->
  <button class="water-fab" id="btn-water-fab" aria-label="Log water bottle">
    💧<span class="water-fab-count" id="fab-water-count"></span>
  </button>

</body>
</html>
